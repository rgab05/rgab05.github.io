// ── Wikipedia image cache & fetcher ──────────────────────────────────────
const imgCache = {};
async function wikiImg(title) {
  if (!title) return null;
  if (imgCache[title] !== undefined) return imgCache[title];
  try {
    const r = await fetch(`https://en.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(title)}`);
    if (!r.ok) { imgCache[title] = null; return null; }
    const j = await r.json();
    const url = j.thumbnail?.source?.replace(/\/\d+px-/, "/500px-") ?? null;
    imgCache[title] = url;
    return url;
  } catch { imgCache[title] = null; return null; }
}

// ── Build an image container that lazy-loads from Wikipedia ──────────────
function imgBox(wikiTitle, bgColor, heightClass) {
  const wrap = document.createElement("div");
  wrap.className = heightClass || "card-img";
  wrap.style.background = bgColor || "#e8e8e8";
  const img = document.createElement("img");
  img.alt = "";
  wrap.appendChild(img);
  if (wikiTitle) {
    wikiImg(wikiTitle).then(url => {
      if (url) { img.src = url; img.onload = () => img.classList.add("loaded"); }
    });
  }
  return wrap;
}

          { name:"African Wildcat", latin:"F. s. lybica", status:"lc", pop:"Unknown", range:"Africa, Middle East", weight:"2.7–6 kg", wiki:"African_wildcat",
            fact:"The direct ancestor of every domestic cat. Domestication occurred ~10,000 years ago in the Fertile Crescent, likely linked to the rise of grain storage and the rodents it attracted." },
          { name:"Domestic Cat", latin:"F. s. catus", status:"domestic", pop:"~600 million", range:"Worldwide", weight:"3.5–5 kg", wiki:"Cat",
            fact:"Technically a subspecies of wildcat. Despite millennia of domestication, domestic cats remain genetically near-identical to African wildcats and retain essentially all of their hunting instincts." }
        ]
      },
      { name:"Sand Cat", latin:"Felis margarita", status:"lc", range:"Sahara, Middle East, Central Asia", wiki:"Sand_cat",
        subspecies:[
          { name:"Saharan Sand Cat", latin:"F. m. margarita", status:"lc", pop:"Unknown", range:"Sahara Desert", weight:"1.5–3.5 kg", wiki:"Sand_cat",
            fact:"Survives temperatures from −5 °C to 52 °C. Dense fur on the paw pads protects from scorching sand and muffles footsteps. Can go weeks without drinking, getting all moisture from prey." }
        ]
      }
    ]
  },
  {
    id:"leopardus", name:"Leopardus", common:"South American Spotted Cats",
    desc:"Small spotted cats throughout the Americas",
    species:[
      { name:"Ocelot", latin:"Leopardus pardalis", status:"lc", range:"Southern USA to South America", wiki:"Ocelot",
        subspecies:[
          { name:"Northern Ocelot", latin:"L. p. albescens", status:"lc", pop:"<50 in US", range:"Texas, Mexico", weight:"6–15 kg", wiki:"Ocelot",
            fact:"Hunted nearly to extinction for their fur in the 20th century. Today a highway in southern Texas divides a US population too small to be genetically viable without wildlife crossings." },
          { name:"South American Ocelot", latin:"L. p. pardalis", status:"lc", pop:"Unknown", range:"South America", weight:"8–18 kg", wiki:"Ocelot",
            fact:"A skilled swimmer and climber, strictly nocturnal. Their eyes reflect up to 6× more light than human eyes. Successful in roughly 1 in 3 hunts." }
        ]
      },
      { name:"Margay", latin:"Leopardus wiedii", status:"nt", range:"Mexico to Argentina", wiki:"Margay",
        subspecies:[
          { name:"Margay", latin:"L. w. wiedii (monotypic)", status:"nt", pop:"Unknown", range:"Central & South America", weight:"2.6–4 kg", wiki:"Margay",
            fact:"One of only two cat species whose ankle joints rotate 180°, allowing headfirst descent of trees. Has been documented mimicking the distress calls of baby tamarins to lure adult monkeys within reach." }
        ]
      }
    ]
  },
  {
    id:"caracal", name:"Caracal", common:"Caracal & Serval",
    desc:"Mid-sized African and Asian cats with exceptional hearing",
    species:[
      { name:"Caracal", latin:"Caracal caracal", status:"lc", range:"Africa, Middle East, Central Asia", wiki:"Caracal",
        subspecies:[
          { name:"African Caracal", latin:"C. c. caracal", status:"lc", pop:"Unknown", range:"Sub-Saharan Africa", weight:"8–19 kg", wiki:"Caracal",
            fact:"Can leap over 3 m vertically to snatch birds in mid-air. Historically trained in India and Persia as a hunting companion — 'caracal' comes from the Turkish for 'black ear'." },
          { name:"Turkestan Caracal", latin:"C. c. michaelis", status:"lc", pop:"Unknown", range:"Central Asia", weight:"11–20 kg", wiki:"Caracal",
            fact:"The northernmost and one of the largest caracal populations. Faces persecution as a livestock predator and habitat loss across arid Central Asian steppes." }
        ]
      },
      { name:"Serval", latin:"Leptailurus serval", status:"lc", range:"Sub-Saharan Africa", wiki:"Serval",
        subspecies:[
          { name:"Common Serval", latin:"L. s. serval", status:"lc", pop:"Unknown", range:"Sub-Saharan Africa", weight:"9–18 kg", wiki:"Serval",
            fact:"Has the largest ears relative to head size of any cat. Can pinpoint prey under snow or in tall grass by hearing alone. Successful in ~50% of hunts — the highest strike rate of any wild cat." }
        ]
      }
    ]
  },
  {
    id:"pardofelis", name:"Pardofelis", common:"Marbled Cat",
    desc:"A rare arboreal cat of Southeast Asian cloud forest",
    species:[
      { name:"Marbled Cat", latin:"Pardofelis marmorata", status:"nt", range:"E. Himalayas to SE Asia", wiki:"Marbled_cat",
        subspecies:[
          { name:"Western Marbled Cat", latin:"P. m. marmorata", status:"nt", pop:"Unknown", range:"Himalayas, Indochina, Sumatra", weight:"2–5 kg", wiki:"Marbled_cat",
            fact:"One of the least-studied wild cats. The tail is proportionally the longest of any small cat — nearly body-length — used for balance while hunting in the forest canopy." },
          { name:"Bornean Marbled Cat", latin:"P. m. longicauda", status:"nt", pop:"Unknown", range:"Borneo", weight:"2–4 kg", wiki:"Marbled_cat",
            fact:"Slightly darker than the western subspecies with a proportionally longer tail. Almost entirely arboreal, hunting birds, lizards and small mammals high in Borneo's forest canopy." }
        ]
      }
    ]
  }
]};

// ── State ─────────────────────────────────────────────────────────────────
let state = { level:"genus", genus:null, species:null, subspecies:null };

// ── Helpers ───────────────────────────────────────────────────────────────
function scls(s) { return s === "domestic" ? "domestic" : s; }

function buildCard(clickFn) {
  const c = document.createElement("div");
  c.className = "card";
  c.onclick = clickFn;
  return c;
}

// ── Render ────────────────────────────────────────────────────────────────
function render() {
  const app = document.getElementById("app");
  app.innerHTML = "";

  // Breadcrumb
  const bc = document.createElement("div");
  bc.className = "breadcrumb";
  let bhtml = `<span class="link" onclick="go('genus')">Felidae</span>`;
  if (state.genus)   bhtml += `<span class="sep">›</span><span class="link" onclick="go('species')">${state.genus.name}</span>`;
  if (state.species) bhtml += `<span class="sep">›</span><span class="link" onclick="go('subspecies')">${state.species.name}</span>`;
  bc.innerHTML = bhtml;
  app.appendChild(bc);

  if      (state.level === "genus")      renderGenus(app);
  else if (state.level === "species")    renderSpecies(app);
  else                                   renderSubspecies(app);
}

function renderGenus(app) {
  const lbl = document.createElement("p");
  lbl.className = "section-title";
  lbl.textContent = `${DATA.genera.length} genera · click to explore`;
  app.appendChild(lbl);

  const grid = document.createElement("div");
  grid.className = "grid";

  DATA.genera.forEach(g => {
    const col = GENUS_COLORS[g.id] || { bg:"#eee", fg:"#555" };
    const spCount  = g.species.length;
    const subCount = g.species.reduce((a, s) => a + s.subspecies.length, 0);

    const card = buildCard(() => { state.genus = g; state.level = "species"; render(); });

    // Silhouette image box
    const imgDiv = document.createElement("div");
    imgDiv.className = "card-img";
    imgDiv.style.background = col.bg;
    imgDiv.innerHTML = catSVG(col.fg);
    card.appendChild(imgDiv);

    const body = document.createElement("div");
    body.className = "card-body";
    body.innerHTML = `<p class="name">${g.name}</p><p class="sci">${g.common}</p><p class="meta">${spCount} species · ${subCount} subspecies</p>`;
    card.appendChild(body);
    grid.appendChild(card);
  });
  app.appendChild(grid);
}

function renderSpecies(app) {
  const g = state.genus;
  const col = GENUS_COLORS[g.id] || { bg:"#eee", fg:"#555" };

  const lbl = document.createElement("p");
  lbl.className = "section-title";
  lbl.textContent = `${g.species.length} species in ${g.name} · click for subspecies`;
  app.appendChild(lbl);

  const grid = document.createElement("div");
  grid.className = "grid";

  g.species.forEach(s => {
    const card = buildCard(() => { state.species = s; state.subspecies = s.subspecies[0]; state.level = "subspecies"; render(); });
    card.appendChild(imgBox(s.wiki, col.bg, "card-img"));

    const body = document.createElement("div");
    body.className = "card-body";
    body.innerHTML = `<span class="status-badge ${scls(s.status)}">${STATUS[s.status] || s.status}</span>
      <p class="name">${s.name}</p>
      <p class="sci">${s.latin}</p>
      <p class="meta">${s.subspecies.length} subspecies · ${s.range}</p>`;
    card.appendChild(body);
    grid.appendChild(card);
  });
  app.appendChild(grid);
}

function renderSubspecies(app) {
  const s   = state.species;
  const g   = state.genus;
  const col = GENUS_COLORS[g.id] || { bg:"#eee", fg:"#555" };

  const lbl = document.createElement("p");
  lbl.className = "section-title";
  lbl.textContent = `${s.subspecies.length} subspecies · click for details`;
  app.appendChild(lbl);

  const grid = document.createElement("div");
  grid.className = "grid";

  s.subspecies.forEach(sub => {
    const card = buildCard(() => { state.subspecies = sub; render(); });
    if (state.subspecies === sub) card.classList.add("selected-card");
    card.appendChild(imgBox(sub.wiki, col.bg, "card-img"));

    const body = document.createElement("div");
    body.className = "card-body";
    body.innerHTML = `<span class="status-badge ${scls(sub.status)}">${STATUS[sub.status] || sub.status}</span>
      <p class="name">${sub.name}</p>
      <p class="sci">${sub.latin}</p>
      <p class="meta">${sub.range}</p>`;
    card.appendChild(body);
    grid.appendChild(card);
  });
  app.appendChild(grid);

  // Info panel
  if (state.subspecies) {
    const sub   = state.subspecies;
    const panel = document.createElement("div");
    panel.className = "info-panel";

    // Large image
    const imgWrap = document.createElement("div");
    imgWrap.className = "info-panel-img-wrap";
    imgWrap.style.background = col.bg;
    const bigImg = document.createElement("img");
    bigImg.alt = sub.name;
    imgWrap.appendChild(bigImg);
    panel.appendChild(imgWrap);
    if (sub.wiki) {
      wikiImg(sub.wiki).then(url => {
        if (url) { bigImg.src = url; bigImg.onload = () => bigImg.classList.add("loaded"); }
      });
    }

    const pbody = document.createElement("div");
    pbody.className = "info-panel-body";
    pbody.innerHTML = `
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:8px;flex-wrap:wrap;">
        <span style="font-size:16px;font-weight:500">${sub.name}</span>
        <span class="status-badge ${scls(sub.status)}" style="margin:0">${STATUS[sub.status] || sub.status}</span>
      </div>
      <p style="font-size:12px;color:#999;font-style:italic;margin:0">${sub.latin}</p>
      <div class="info-grid">
        <div class="info-item"><div class="label">Population</div><div class="value">${sub.pop}</div></div>
        <div class="info-item"><div class="label">Weight</div><div class="value">${sub.weight}</div></div>
        <div class="info-item full"><div class="label">Range</div><div class="value">${sub.range}</div></div>
      </div>
      <p class="fact">${sub.fact}</p>`;
    panel.appendChild(pbody);
    app.appendChild(panel);
  }
}

// ── Navigation ────────────────────────────────────────────────────────────
function go(level) {
  if      (level === "genus")     state = { level:"genus", genus:null, species:null, subspecies:null };
  else if (level === "species")   { state.level = "species"; state.species = null; state.subspecies = null; }
  else                            { state.level = "subspecies"; state.subspecies = state.species.subspecies[0]; }
  render();
}

render();
</script>
